<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇帝养成 - 个人网站</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #8B0000 0%, #DC143C 100%);
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .game-header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .game-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .phase {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .phase-title {
            font-size: 2em;
            color: #8B0000;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 抽卡阶段 */
        .draw-area {
            text-align: center;
            padding: 40px;
        }
        .draw-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        .draw-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .card-reveal {
            margin-top: 30px;
            display: none;
        }
        .card-reveal.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .dynasty-card {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 3px solid #FFD700;
        }
        .dynasty-name {
            font-size: 3em;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .dynasty-info {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .start-btn {
            background: #228B22;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* 游戏主界面 */
        .game-main {
            display: none;
        }
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }
        @media (max-width: 900px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
        }
        .main-content {
            min-width: 0;
        }
        .side-panel {
            background: #FFF8DC;
            border-radius: 10px;
            border: 2px solid #8B4513;
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
        }
        .side-panel h3 {
            color: #8B0000;
            margin: 0 0 10px 0;
            font-size: 1.1em;
        }
        .status-bar {
            background: #FFF8DC;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #8B4513;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .status-item {
            text-align: center;
        }
        .status-label {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        .status-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #8B0000;
        }
        .power-bar {
            background: #eee;
            border-radius: 5px;
            height: 8px;
            margin-top: 4px;
            overflow: hidden;
        }
        .power-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s, background 0.5s;
        }
        .power-fill.green { background: linear-gradient(90deg, #4CAF50, #66BB6A); }
        .power-fill.yellow { background: linear-gradient(90deg, #FFC107, #FFD54F); }
        .power-fill.red { background: linear-gradient(90deg, #f44336, #ef5350); }

        .action-panel {
            background: #FFF8DC;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #8B4513;
            min-height: 400px;
        }
        .action-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #8B4513;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #8B4513;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #DC143C;
            transform: translateY(-3px);
        }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }

        .event-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #8B0000;
            position: relative;
        }
        .event-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            color: white;
            font-weight: bold;
        }
        .event-tag.main { background: #DC143C; }
        .event-tag.crisis { background: #ff4444; }
        .event-tag.opportunity { background: #4CAF50; }
        .event-tag.annual { background: #FF9800; }
        .event-tag.followup { background: #2196F3; }

        .event-title {
            font-size: 1.4em;
            color: #8B0000;
            margin-bottom: 15px;
            padding-right: 80px;
        }
        .event-desc {
            line-height: 1.8;
            margin-bottom: 20px;
            color: #333;
        }
        .choice-btn {
            background: #8B4513;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px 5px 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }
        .choice-btn:hover {
            background: #DC143C;
            transform: scale(1.03);
        }
        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            background: linear-gradient(135deg, #FFF9C4, #FFF8E1);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 20px;
            margin-top: 15px;
            animation: slideUp 0.5s;
        }
        .result-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #8B0000;
            margin-bottom: 10px;
        }
        .result-desc {
            line-height: 1.6;
            color: #333;
            margin-bottom: 10px;
        }
        .result-effects {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .effect-item {
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .effect-pos { background: #C8E6C9; color: #2E7D32; }
        .effect-neg { background: #FFCDD2; color: #C62828; }
        .effect-neu { background: #E3F2FD; color: #1565C0; }

        .concubine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .concubine-card {
            background: linear-gradient(135deg, #FFB6C1 0%, #FFC0CB 100%);
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .concubine-card:hover {
            transform: translateY(-5px);
            border-color: #DC143C;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .concubine-card.selected {
            border-color: #FFD700;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
        }
        .concubine-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #8B0000;
            margin-bottom: 5px;
        }
        .concubine-rank {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 8px;
        }
        .concubine-favor {
            font-size: 0.85em;
            color: #8B4513;
        }
        .favor-bar {
            background: #ddd;
            border-radius: 4px;
            height: 6px;
            margin-top: 5px;
            overflow: hidden;
        }
        .favor-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF69B4, #FF1493);
            border-radius: 4px;
            transition: width 0.5s;
        }

        .message-box {
            background: #FFF8DC;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #FFD700;
            display: none;
        }
        .message-box.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        /* 年度总结 */
        .annual-review {
            background: linear-gradient(135deg, #FFF9C4, #FFF8E1);
            border: 3px solid #FFD700;
            border-radius: 15px;
            padding: 25px;
            margin-top: 15px;
            animation: fadeIn 0.5s;
        }
        .annual-review h3 {
            color: #8B0000;
            font-size: 1.5em;
            margin-bottom: 15px;
            text-align: center;
        }
        .review-item {
            padding: 8px 0;
            border-bottom: 1px dashed #ccc;
        }
        .review-item:last-child { border-bottom: none; }

        /* 成就标签 */
        .achievement-tag {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #8B0000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            margin: 3px;
        }
        .achievement-tag.locked {
            background: #ccc;
            color: #999;
        }

        /* 事件历史 */
        .history-entry {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.85em;
            line-height: 1.4;
        }
        .history-year {
            color: #8B0000;
            font-weight: bold;
        }
        .history-choice {
            color: #666;
        }

        /* 大臣卡片 */
        .minister-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border: 2px solid #8B4513;
            transition: all 0.3s;
        }
        .minister-card:hover {
            border-color: #DC143C;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }
        .minister-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #8B0000;
        }
        .minister-role {
            color: #666;
            font-size: 0.85em;
        }
        .minister-ability {
            color: #8B4513;
            font-size: 0.85em;
            margin: 5px 0;
        }
        .minister-action {
            background: #8B4513;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            margin-top: 5px;
        }
        .minister-action:hover {
            background: #DC143C;
        }

        /* Game over */
        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .game-over-overlay.show {
            display: flex;
        }
        .game-over-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.5s;
        }
        .game-over-title {
            font-size: 2em;
            color: #8B0000;
            margin-bottom: 20px;
        }
        .game-over-legacy {
            font-size: 1.2em;
            margin: 15px 0;
            line-height: 1.8;
        }
        .game-over-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .restart-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse { animation: pulse 0.5s; }

        /* 标题称号 */
        .emperor-title {
            text-align: center;
            color: #8B0000;
            font-size: 1.1em;
            margin-bottom: 15px;
            padding: 8px 15px;
            background: linear-gradient(135deg, #FFF9C4, #FFF8E1);
            border-radius: 8px;
            border: 1px solid #FFD700;
        }

        .action-btn {
            background: #8B4513;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            margin: 5px 5px 5px 0;
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: #DC143C;
        }
        .action-btn.primary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #8B0000;
            font-weight: bold;
        }

        .next-year-btn {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .next-year-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">我的空间</a>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/games">游戏</a></li>
                <li><a href="/raise" class="active">养成</a></li>
                <li><a href="/economy">经济</a></li>
                <li><a href="/anniversary">纪念</a></li>
                <li><a href="/vpn/">代理</a></li>
                <li><a href="/#about">关于</a></li>
                <li><a href="/admin">管理</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                <span class="icon">🌙</span>
            </button>
        </div>
    </nav>

    <div class="game-container">
        <div class="game-header">
            <h1>👑 皇帝养成</h1>
            <p>穿越千年，执掌江山，成就一代帝王传奇</p>
        </div>

        <!-- 抽卡阶段 -->
        <div class="phase" id="draw-phase">
            <h2 class="phase-title">命运之轮 - 抽取你的朝代</h2>
            <div class="draw-area">
                <button class="draw-btn" onclick="drawDynasty()">🎴 开始抽卡</button>
                <div class="card-reveal" id="card-reveal">
                    <div class="dynasty-card">
                        <div class="dynasty-name" id="dynasty-name"></div>
                        <div class="dynasty-info" id="dynasty-info"></div>
                        <button class="start-btn" onclick="startGame()">开始帝王生涯</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 游戏主界面 -->
        <div class="phase game-main" id="game-main">
            <div class="status-bar">
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">🏛️ 朝代</div>
                        <div class="status-value" id="current-dynasty"></div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">💰 国库</div>
                        <div class="status-value" id="treasury">1000万</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">❤️ 民心</div>
                        <div class="status-value" id="popularity">70</div>
                        <div class="power-bar"><div class="power-fill" id="popularity-bar"></div></div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">⚔️ 军力</div>
                        <div class="status-value" id="military">80</div>
                        <div class="power-bar"><div class="power-fill" id="military-bar"></div></div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">📚 文化</div>
                        <div class="status-value" id="culture">50</div>
                        <div class="power-bar"><div class="power-fill" id="culture-bar"></div></div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">📅 年份</div>
                        <div class="status-value" id="year">元年</div>
                    </div>
                </div>
            </div>

            <div class="emperor-title" id="emperor-title">🌟 新皇登基</div>

            <div class="game-layout">
                <div class="main-content">
                    <div class="action-panel">
                        <div class="action-tabs">
                            <button class="tab-btn active" onclick="switchTab(event, 'memorials')">📜 批阅奏折</button>
                            <button class="tab-btn" onclick="switchTab(event, 'concubines')">🌸 后宫</button>
                            <button class="tab-btn" onclick="switchTab(event, 'ministers')">👔 朝堂</button>
                            <button class="tab-btn" onclick="switchTab(event, 'actions')">⚡ 国策</button>
                        </div>

                        <!-- 批阅奏折 -->
                        <div class="tab-content active" id="memorials-tab">
                            <div id="event-area"></div>
                            <div id="result-area"></div>
                            <div style="margin-top:15px; text-align:center;">
                                <button class="next-year-btn" onclick="nextYear()">📅 进入下一年</button>
                            </div>
                        </div>

                        <!-- 后宫 -->
                        <div class="tab-content" id="concubines-tab">
                            <h3 style="color: #8B0000; margin-bottom: 15px;">后宫佳丽</h3>
                            <div class="concubine-grid" id="concubine-grid"></div>
                            <div id="concubine-result"></div>
                        </div>

                        <!-- 朝堂 -->
                        <div class="tab-content" id="ministers-tab">
                            <h3 style="color: #8B0000; margin-bottom: 15px;">朝堂大臣</h3>
                            <div id="minister-list"></div>
                        </div>

                        <!-- 国策 -->
                        <div class="tab-content" id="actions-tab">
                            <h3 style="color: #8B0000; margin-bottom: 15px;">国家决策</h3>
                            <div id="policy-area"></div>
                        </div>
                    </div>
                </div>

                <div class="side-panel">
                    <h3>🏆 成就</h3>
                    <div id="achievements-list"></div>
                    <h3 style="margin-top:20px;">📜 历史</h3>
                    <div id="history-log"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over -->
    <div class="game-over-overlay" id="game-over-overlay">
        <div class="game-over-box">
            <div class="game-over-title" id="go-title"></div>
            <div class="game-over-legacy" id="go-legacy"></div>
            <div class="game-over-stats" id="go-stats"></div>
            <button class="restart-btn" onclick="location.reload()">🔄 重新开始</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="social-links">
                <a href="#" class="social-link" aria-label="GitHub">GitHub</a>
                <a href="#" class="social-link" aria-label="Twitter">Twitter</a>
                <a href="#" class="social-link" aria-label="Email">Email</a>
            </div>
            <p class="copyright">© 2024 我的个人空间. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <script>
        // ============================================================
        // 朝代数据
        // ============================================================
        const dynasties = [
            {
                name: '秦朝', emperor: '秦始皇', year: 221,
                info: '刚刚统一六国，百废待兴。推行郡县制，统一度量衡、文字。但六国旧贵族蠢蠢欲动，匈奴在北方虎视眈眈。',
                treasury: 800, popularity: 60, military: 90, culture: 30,
                intro: '你站在那威严肃穆的咸阳宫前，百官朝拜。你，就是千古一帝——秦始皇！'
            },
            {
                name: '汉朝', emperor: '汉武帝', year: 141,
                info: '文景之治后国力鼎盛。北有匈奴威胁，南有百越未服。儒家思想逐渐兴起，需要决定国策方向。',
                treasury: 1200, popularity: 75, military: 85, culture: 50,
                intro: '你登上未央宫的高台，俯瞰大汉江山。文景之治打下了坚实基础，但北方的匈奴铁骑始终是心头大患。'
            },

        function drawDynasty() {

            document.getElementById('year').textContent = `第${gameState.year}年`;

            // 更新进度条
            updateBar('popularity-bar', gameState.popularity);
            updateBar('military-bar', gameState.military);
            updateBar('culture-bar', gameState.culture);
        }

        function updateBar(id, value) {
            const bar = document.getElementById(id);
            bar.style.width = Math.max(0, Math.min(100, value)) + '%';
            bar.className = 'power-fill ' + (value >= 70 ? 'green' : value >= 40 ? 'yellow' : 'red');
        }

        function updateTitle() {
            let title = emperorTitles[0];
            for (const t of emperorTitles) {
                if (gameState.year >= t.min) title = t;
            }
            document.getElementById('emperor-title').innerHTML = `${title.title} <span style="font-size:0.8em; color:#666;">— ${title.desc}</span>`;
        }

        // ============================================================
        // 事件系统
        // ============================================================

        function nextEvent() {
            // 先检查是否有待触发的后续事件
            if (gameState.pendingFollowUp && gameState.pendingFollowUp.triggered) {
                const event = followUpEvents[gameState.pendingFollowUp.id];
                if (event) {
                    showEvent({ ...event, isFollowUp: true });
                    gameState.pendingFollowUp = null;
                    return;
                }
            }

            // 正常随机事件
            const pool = getEventPool();
            if (pool.length === 0) return;
            const event = pool[Math.floor(Math.random() * pool.length)];
            gameState.currentEvent = event;
            showEvent(event);
        }

        function showEvent(event) {
            gameState.totalEvents++;
            const eventArea = document.getElementById('event-area');
            const resultArea = document.getElementById('result-area');
            resultArea.innerHTML = '';

            const tagClass = event.tag || 'main';
            const tagLabel = { main: '主线', crisis: '危机', opportunity: '机遇', annual: '年度', followup: '后续' }[event.tag] || '事件';

            let choicesHtml = event.choices.map((c, i) =>
                `<button class="choice-btn" onclick="makeChoice(${i})">${c.text}</button>`
            ).join('');

            eventArea.innerHTML = `
                <div class="event-card">
                    <span class="event-tag ${tagClass}">${tagLabel}</span>
                    <div class="event-title">${event.title}</div>
                    <div class="event-desc">${event.desc}</div>
                    <div>${choicesHtml}</div>
                </div>
            `;

            // 切换到奏折tab
            switchTab({ target: document.querySelector('.tab-btn') }, 'memorials');
        }

        function makeChoice(idx) {
            const event = gameState.currentEvent;
            if (!event) return;
            const choice = event.choices[idx];

            // 应用效果
            if (choice.effect.treasury) gameState.treasury += choice.effect.treasury;
            if (choice.effect.popularity) gameState.popularity += choice.effect.popularity;
            if (choice.effect.military) gameState.military += choice.effect.military;
            if (choice.effect.culture) gameState.culture += choice.effect.culture;

            // 限制范围
            gameState.popularity = Math.max(0, Math.min(100, gameState.popularity));
            gameState.military = Math.max(0, Math.min(100, gameState.military));
            gameState.culture = Math.max(0, Math.min(100, gameState.culture));

            // 记录
            gameState.decisionCount++;

            // 处理后续事件
            if (choice.followUp) {
                // 标记下一个事件周期触发
                gameState.pendingFollowUp = { id: choice.followUp.id, triggered: true };
            } else {
                gameState.pendingFollowUp = null;
            }

            // 显示结果
            const resultArea = document.getElementById('result-area');
            let effectsHtml = '';
            if (choice.effect) {
                const effects = choice.effect;
                const effectItems = [];
                if (effects.treasury) effectItems.push(`<span class="effect-item ${effects.treasury >= 0 ? 'effect-pos' : 'effect-neg'}">💰 ${effects.treasury >= 0 ? '+' : ''}${effects.treasury}万</span>`);
                if (effects.popularity) effectItems.push(`<span class="effect-item ${effects.popularity >= 0 ? 'effect-pos' : 'effect-neg'}">❤️ ${effects.popularity >= 0 ? '+' : ''}${effects.popularity}</span>`);
                if (effects.military) effectItems.push(`<span class="effect-item ${effects.military >= 0 ? 'effect-pos' : 'effect-neg'}">⚔️ ${effects.military >= 0 ? '+' : ''}${effects.military}</span>`);
                if (effects.culture) effectItems.push(`<span class="effect-item ${effects.culture >= 0 ? 'effect-pos' : 'effect-neg'}">📚 ${effects.culture >= 0 ? '+' : ''}${effects.culture}</span>`);
                effectsHtml = `<div class="result-effects">${effectItems.join('')}</div>`;
            }

            resultArea.innerHTML = `
                <div class="result-box">
                    <div class="result-title">📢 决策结果</div>
                    <div class="result-desc">${choice.result}</div>
                    ${effectsHtml}
                </div>
            `;

            // 记录历史
            addHistory(event.title, choice.text);

            // 更新UI
            updateStatus();
            updateTitle();
            updateAchievements();
            renderMinisters();

            // 禁用选择按钮
            document.querySelectorAll('.choice-btn').forEach(btn => { btn.disabled = true; btn.style.opacity = '0.4'; });

            // 检查游戏结束
            checkGameOver();
        }

            gameState.treasury += income;

            // 随机年成
            const harvests = annualEvents.harvest;
            const harvest = harvests[Math.floor(Math.random() * harvests.length)];
            if (harvest.effect.treasury) gameState.treasury += harvest.effect.treasury;
            if (harvest.effect.popularity) gameState.popularity += harvest.effect.popularity;

            // 限制范围
            gameState.popularity = Math.max(0, Math.min(100, gameState.popularity));
            gameState.military = Math.max(0, Math.min(100, gameState.military));
            gameState.culture = Math.max(0, Math.min(100, gameState.culture));

            // 自然衰减
            if (gameState.popularity > 80) gameState.popularity -= 2; // 高处不胜寒
            if (gameState.year % 3 === 0) gameState.military -= 3; // 久不练则废

            updateStatus();
            updateTitle();
            updateAchievements();

            showAnnualReview(harvest, income);

            renderConcubines();
            updateAchievements();
            addHistory('后宫', `宠幸${c.name}`);
        }

        // 修改卡片点击行为 - 在后宫tab中点击直接触发
        function selectConcubineCard(idx) {
            selectedConcubine = idx;
            renderConcubines();
            // 添加访问按钮
            const grid = document.getElementById('concubine-grid');
            const resultDiv = document.getElementById('concubine-result');
            resultDiv.innerHTML = `
                <div style="text-align:center; margin-top:15px;">
                    <button class="action-btn primary" onclick="visitConcubine(${idx})">🌸 今夜宠幸${concubines[idx].name}</button>
                </div>
            `;
        }

        // ============================================================
        // 大臣系统
        // ============================================================

        function renderMinisters() {
            const list = document.getElementById('minister-list');
            list.innerHTML = ministers.filter(m => m.status === 'active').map((m, i) => `
                <div class="minister-card">
                    <div class="minister-name">${m.name}</div>
                    <div class="minister-role">${m.role}</div>
                    <div class="minister-ability">💪 ${m.ability}：${m.abilityVal} | 忠诚：${m.loyalty}</div>
                    <button class="minister-action" onclick="delegateTask(${i})">委派：${getDelegateTask(m, i)}</button>
                </div>
            `).join('');
        }

        function getDelegateTask(m, i) {
            const tasks = {
                '治理': '整顿吏治',
                '军事': '巡边防务',
                '财政': '清查账目',
                '文化': '编修典籍',
                '监察': '巡视地方'
            };
            return tasks[m.ability] || '办理要务';
        }

        function delegateTask(idx) {
            const m = ministers[idx];
            if (!m || m.status !== 'active') return;

            const success = Math.random() < (m.abilityVal / 100) * 0.8 + 0.1;
            const resultDiv = document.getElementById('event-area');

            if (success) {
                const results = {
                    '治理': { popularity: 10, treasury: 50, text: `${m.name}整顿吏治成效显著，贪官污吏纷纷落马，百姓拍手称快。` },
                    '军事': { military: 10, text: `${m.name}巡边防务归来，对军队进行了全面评估和调整。边防更加稳固。` },
                    '财政': { treasury: 200, text: `${m.name}清查账目发现了不少漏洞，追回了大量被贪污的银两。` },
                    '文化': { culture: 15, text: `${m.name}编修典籍大获成功，收集了大量珍贵的文献典籍。` },
                    '监察': { popularity: 15, treasury: 100, text: `${m.name}巡视地方归来，揭发了多起地方官贪腐案件，为民除害。` }
                };
                const r = results[m.ability];
                if (r.popularity) gameState.popularity = Math.min(100, gameState.popularity + r.popularity);
                if (r.treasury) gameState.treasury += r.treasury;
                if (r.military) gameState.military = Math.min(100, gameState.military + r.military);
                if (r.culture) gameState.culture = Math.min(100, gameState.culture + r.culture);

                resultDiv.innerHTML += `
                    <div class="result-box">
                        <div class="result-title">✅ ${m.name} ${getDelegateTask(m, idx)}圆满成功！</div>
                        <div class="result-desc">${r.text}</div>
                        <div class="result-effects">
                            ${r.popularity ? `<span class="effect-item effect-pos">❤️ 民心+${r.popularity}</span>` : ''}
                            ${r.treasury ? `<span class="effect-item effect-pos">💰 +${r.treasury}万</span>` : ''}
                            ${r.military ? `<span class="effect-item effect-pos">⚔️ 军力+${r.military}</span>` : ''}
                            ${r.culture ? `<span class="effect-item effect-pos">📚 文化+${r.culture}</span>` : ''}
                        </div>
                    </div>
                `;
                addHistory('朝堂', `${m.name}${getDelegateTask(m, idx)}成功`);
            } else {
                gameState.popularity = Math.max(0, gameState.popularity - 5);
                resultDiv.innerHTML += `
                    <div class="result-box" style="border-color: #ff4444;">
                        <div class="result-title" style="color: #ff4444;">❌ ${m.name} ${getDelegateTask(m, idx)}遭遇挫折</div>
                        <div class="result-desc">${m.name}能力有限，事情没有办漂亮。百姓略有微词。</div>
                        <div class="result-effects">
                            <span class="effect-item effect-neg">❤️ 民心-5</span>
                        </div>
                    </div>
                `;
                addHistory('朝堂', `${m.name}${getDelegateTask(m, idx)}失败`);
            }

            updateStatus();
            updateAchievements();
        }

        // ============================================================
        // 国策系统
        // ============================================================

        function renderPolicies() {
            const area = document.getElementById('policy-area');
            const policies = [
                { id: 'tax_cut', name: '减税政策', desc: '减轻百姓赋税，换取民心支持', effect: { popularity: 10, treasury: -150 }, cost: 150 },
                { id: 'tax_raise', name: '加税政策', desc: '增加赋税充实国库，但百姓会有怨言', effect: { popularity: -10, treasury: 250 }, cost: -250 },
                { id: 'train_army', name: '训练军队', desc: '加强军事训练，提升军力', effect: { military: 15, treasury: -100 }, cost: 100 },
                { id: 'promote_culture', name: '推崇文化', desc: '修建书院，奖励学术', effect: { culture: 15, treasury: -80 }, cost: 80 },
                { id: 'rest', name: '休养生息', desc: '什么都不做，让国家自然恢复', effect: { popularity: 3, treasury: 30 }, cost: 0 },
            ];
            area.innerHTML = policies.map(p => `
                <div class="minister-card" style="cursor:pointer;" onclick="executePolicy('${p.id}')">
                    <div class="minister-name">${p.name}</div>
                    <div class="minister-role">${p.desc}</div>
                    <div class="minister-ability">
                        ${p.effect.popularity ? `<span style="color:${p.effect.popularity >= 0 ? '#4CAF50' : '#f44336'}">民心${p.effect.popularity >= 0 ? '+' : ''}${p.effect.popularity}</span>` : ''}
                        ${p.effect.treasury ? `<span style="color:${p.effect.treasury >= 0 ? '#4CAF50' : '#f44336'}; margin-left:15px;">${p.effect.treasury >= 0 ? '+' : ''}${p.effect.treasury}万</span>` : ''}
                        ${p.effect.military ? `<span style="color:${p.effect.military >= 0 ? '#4CAF50' : '#f44336'}; margin-left:15px;">军力+${p.effect.military}</span>` : ''}
                        ${p.effect.culture ? `<span style="color:${p.effect.culture >= 0 ? '#4CAF50' : '#f44336'}; margin-left:15px;">文化+${p.effect.culture}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function executePolicy(policyId) {
            const policies = {
                'tax_cut': { popularity: 10, treasury: -150, result: '你下令减税，百姓欢天喜地。虽然国库收入减少了，但民心大涨。' },
                'tax_raise': { popularity: -10, treasury: 250, result: '你增加了赋税。国库充盈了，但百姓怨声载道。' },
                'train_army': { military: 15, treasury: -100, result: '你下令全军集训。将士们士气高涨，军力大增。' },
                'promote_culture': { culture: 15, treasury: -80, result: '你在全国修建书院，奖励学术。文化氛围日益浓厚。' },
                'rest': { popularity: 3, treasury: 30, result: '你让国家休养生息。虽然进展缓慢，但一切都在稳步改善。' }
            };
            const p = policies[policyId];
            if (!p) return;

            if (p.popularity) gameState.popularity = Math.min(100, Math.max(0, gameState.popularity + p.popularity));
            if (p.treasury) gameState.treasury += p.treasury;
            if (p.military) gameState.military = Math.min(100, Math.max(0, gameState.military + p.military));
            if (p.culture) gameState.culture = Math.min(100, Math.max(0, gameState.culture + p.culture));

            gameState.decisionCount++;

            // 在奏折tab显示结果
            const resultArea = document.getElementById('result-area');
            let effectsHtml = '';
            const items = [];
            if (p.popularity) items.push(`<span class="effect-item ${p.popularity >= 0 ? 'effect-pos' : 'effect-neg'}">❤️ ${p.popularity >= 0 ? '+' : ''}${p.popularity}</span>`);
            if (p.treasury) items.push(`<span class="effect-item ${p.treasury >= 0 ? 'effect-pos' : 'effect-neg'}">💰 ${p.treasury >= 0 ? '+' : ''}${p.treasury}万</span>`);
            if (p.military) items.push(`<span class="effect-item ${p.military >= 0 ? 'effect-pos' : 'effect-neg'}">⚔️ +${p.military}</span>`);
            if (p.culture) items.push(`<span class="effect-item ${p.culture >= 0 ? 'effect-pos' : 'effect-neg'}">📚 +${p.culture}</span>`);
            effectsHtml = `<div class="result-effects">${items.join('')}</div>`;

            resultArea.innerHTML = `
                <div class="result-box">
                    <div class="result-title">📢 国策执行完毕</div>
                    <div class="result-desc">${p.result}</div>
                    ${effectsHtml}
                </div>
            `;

            updateStatus();
            updateAchievements();
            addHistory('国策', policyId);

            // 切换到奏折tab
            const firstTab = document.querySelector('.tab-btn');
            switchTab({ target: firstTab }, 'memorials');
        }

        // ============================================================
        // 成就系统
        // ============================================================

        function updateAchievements() {
            const list = document.getElementById('achievements-list');
            gameState.unlockedAchievements = [];
            let html = '';
            for (const a of achievements) {
                const unlocked = a.check(gameState);
                if (unlocked) gameState.unlockedAchievements.push(a.id);
                html += `<span class="achievement-tag ${unlocked ? '' : 'locked'}" title="${a.desc}">${a.icon} ${a.name}</span>`;
            }
            list.innerHTML = html;
        }

        // ============================================================
        // Tab 切换
        // ============================================================

        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');

            // 后宫tab中，渲染后自动添加访问按钮
            if (tabName === 'concubines') {
                renderConcubines();
            }
        }

        // ============================================================
        // Game Over
        // ============================================================

        function checkGameOver() {
            let gameOver = false;
            let reason = '';

            if (gameState.popularity <= 0) {
                gameOver = true;
                reason = '民心尽失，百姓揭竿而起！';
            } else if (gameState.treasury <= 0) {
                gameOver = true;
                reason = '国库空虚，无力维持统治！';
            } else if (gameState.military <= 0) {
                gameOver = true;
                reason = '军力崩溃，敌军长驱直入！';
            }

            if (gameOver) {
                showGameOver(reason);
            }
        }

        function showGameOver(reason) {
            const avg = (gameState.popularity + gameState.military + gameState.culture) / 3;
            let legacy = '';
            if (avg >= 80) legacy = '虽有遗憾，但你确实是一位明君。史书会记住你的功绩。';
            else if (avg >= 50) legacy = '你治下平平，无功无过。历史对你评价一般。';
            else legacy = '你治下乱象丛生，后世对你的评价恐怕不会太高。';

            const overlay = document.getElementById('game-over-overlay');
            overlay.classList.add('show');
            document.getElementById('go-title').textContent = reason;
            document.getElementById('go-legacy').textContent = legacy;
            document.getElementById('go-stats').innerHTML = `
                <div>📅 统治年限：${gameState.year}年</div>
                <div>📜 决策总数：${gameState.decisionCount}次</div>
                <div>👶 皇嗣数量：${gameState.heirs}人</div>
                <div>🏆 成就解锁：${gameState.unlockedAchievements.length}/${achievements.length}</div>
                <div>💰 最终国库：${gameState.treasury}万</div>
                <div>📊 综合国力：${getPowerLevel()}</div>
            `;
        }

        // 初始化后宫tab - 添加点击事件
        function initConcubineTab() {
            const grid = document.getElementById('concubine-grid');
            grid.addEventListener('click', function(e) {
                const card = e.target.closest('.concubine-card');
                if (card) {
                    const idx = [...grid.children].indexOf(card);
                    selectConcubineCard(idx);
                }
            });
        }

        // 页面加载后初始化
        window.onload = function() {
            initConcubineTab();
        };
    </script>
</body>
</html>
