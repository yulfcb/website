<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}丝绸之路 · 回家{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <!-- M2 接 Pixi.js v7（CDN，无 npm） -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
  <style>
    body { background: #1b2135; color: #f4ecd8; }
    .silk-stage {
      max-width: 720px; margin: 48px auto; padding: 32px 24px;
      text-align: center; border-radius: 16px;
      background: linear-gradient(160deg, #2a2140 0%, #1b2135 100%);
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    .silk-badge {
      display: inline-block; padding: 4px 14px; margin-bottom: 12px;
      border-radius: 999px; font-size: 13px; letter-spacing: 1px;
      background: #e8b96a; color: #2a2140; font-weight: 700;
    }
    .silk-title { font-size: 30px; margin: 8px 0 4px; color: #ffd98a; }
    .silk-vehicle { font-size: 56px; margin: 12px 0; }
    .silk-quote { font-size: 15px; color: #a8d8c0; font-style: italic; min-height: 22px; }
    .silk-placeholder { margin: 20px 0 6px; color: #c9c2d8; }
    .silk-hint { font-size: 13px; color: #f6b5c8; margin: 0 0 8px; }
    .silk-next, .silk-back, .silk-start, .silk-go {
      display: inline-block; margin-top: 20px; padding: 12px 28px;
      border-radius: 999px; text-decoration: none; font-weight: 700;
      background: #f6b5c8; color: #2a2140; transition: transform .12s ease;
      border: none; cursor: pointer; font-size: 15px;
    }
    .silk-next:hover, .silk-back:hover, .silk-start:hover, .silk-go:hover {
      transform: translateY(-2px);
    }
    .silk-back { background: transparent; color: #a8d8c0; border: 1px solid #4a5578; margin-left: 8px; }
    .silk-start { background: #ffd98a; color: #2a2140; }
    .silk-total { font-size: 42px; color: #ffd98a; font-weight: 800; margin: 16px 0; }
    /* M2 Pixi 舞台 */
    #pixi-stage { margin: 18px auto 8px; border-radius: 12px; overflow: hidden;
                  box-shadow: 0 8px 28px rgba(0,0,0,.4); max-width: 100%; }
    #pixi-stage canvas { display: block; max-width: 100%; height: auto; }
    .silk-progress { display: none; font-size: 14px; color: #ffd98a; margin: 6px 0 12px; }
    /* M3 倒计时大字：关 3/4 顶部居中、显眼 */
    .silk-timer { display: none; font-size: 28px; font-weight: 800;
                  color: #f6b5c8; text-shadow: 0 2px 8px rgba(0,0,0,.4);
                  margin: 6px 0 12px; letter-spacing: 1px; }
    .silk-timer.warn { color: #ffb86c; }
    .silk-timer.danger { color: #f87171; animation: silk-timer-pulse .6s ease-in-out infinite; }
    @keyframes silk-timer-pulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.08); }
    }
    /* M3 复活 modal */
    .slk-revive-overlay {
      position: fixed; inset: 0; background: rgba(20, 16, 36, .78);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 16px;
    }
    .slk-revive-modal {
      width: 100%; max-width: 420px; padding: 28px 24px;
      border-radius: 18px;
      background: linear-gradient(160deg, #3a2140 0%, #1b2135 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      color: #f4ecd8; text-align: center;
    }
    .slk-revive-title { font-size: 22px; margin: 0 0 10px; color: #ffd98a; }
    .slk-revive-tip   { font-size: 14px; color: #c9c2d8; margin: 0 0 16px; line-height: 1.6; }
    .slk-revive-sub   { color: #a8d8c0; font-size: 12px; }
    #silk-revive-text {
      width: 100%; min-height: 88px; box-sizing: border-box;
      padding: 10px 14px; border-radius: 12px; border: 1px solid #4a5578;
      background: #2a2140; color: #f4ecd8; font-size: 15px; line-height: 1.5;
      font-family: inherit; resize: vertical;
    }
    .slk-revive-text:focus { outline: none; border-color: #f6b5c8; }
    .slk-revive-actions { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
    .slk-revive-send, .slk-revive-giveup {
      padding: 10px 24px; border-radius: 999px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .slk-revive-send   { background: #f6b5c8; color: #2a2140; }
    .slk-revive-giveup { background: transparent; color: #a8d8c0; border: 1px solid #4a5578; }
    .slk-revive-status { margin-top: 12px; min-height: 18px; font-size: 14px; color: #a8d8c0; }
    .silk-win { display: none; margin-top: 18px; padding: 16px;
                border-radius: 12px; background: rgba(168, 216, 192, 0.12);
                border: 1px solid #a8d8c0; }
    .silk-win .silk-reward { font-size: 28px; color: #ffd98a; font-weight: 800; }
    .silk-webhook-status { font-size: 13px; margin-top: 6px; }
    .silk-next { display: none; margin-top: 14px; }

    /* M9.4 世界地图浮动按钮（关 1-5 通用）*/
    .silk-fab-map {
      position: fixed; top: 12px; right: 12px;
      width: 44px; height: 44px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255, 217, 138, 0.92);
      color: #2a2140; text-decoration: none;
      font-size: 20px; line-height: 1;
      box-shadow: 0 4px 12px rgba(0,0,0,.35);
      border: 1px solid rgba(255, 217, 138, 0.6);
      transition: transform .14s ease, background .14s ease;
      z-index: 1000;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .silk-fab-map:hover { transform: translateY(-2px); background: #ffd98a; }
    .silk-fab-map:focus { outline: none; box-shadow: 0 4px 12px rgba(0,0,0,.35), 0 0 0 3px rgba(255, 217, 138, .4); }
    @media (max-width: 480px) {
      .silk-fab-map { top: 8px; right: 8px; width: 40px; height: 40px; font-size: 18px; }
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  {# v11: 删掉背景音乐 (silk-road-bgm), 保留 SFX 通道 #}
  {# M17: SFX 通道 — 每个 sfx-* 是独立 audio, 多次触发会重置 currentTime 重叠播放 #}
  <audio id="sfx-click"     src="{{ url_for('static', filename='silk-road/qatar/audio/sfx-click.wav') }}"     preload="auto" style="display:none"></audio>
  <audio id="sfx-button"    src="{{ url_for('static', filename='silk-road/qatar/audio/sfx-button.wav') }}"    preload="auto" style="display:none"></audio>
  <audio id="sfx-pickup"    src="{{ url_for('static', filename='silk-road/qatar/audio/sfx-pickup.wav') }}"    preload="auto" style="display:none"></audio>
  <audio id="sfx-exchange"  src="{{ url_for('static', filename='silk-road/qatar/audio/sfx-exchange.wav') }}"  preload="auto" style="display:none"></audio>
  <audio id="sfx-voyage"    src="{{ url_for('static', filename='silk-road/qatar/audio/sfx-voyage.wav') }}"    preload="auto" style="display:none"></audio>
  <audio id="sfx-die"       src="{{ url_for('static', filename='silk-road/qatar/audio/sfx-die.wav') }}"       preload="auto" style="display:none"></audio>
  {# M9.4 世界地图浮动按钮（关 1-5 通用）#}
  <a class="silk-fab-map" href="{{ url_for('silk_road_world_map') }}" aria-label="世界地图" title="世界地图">🗺️</a>
  {# v13: 删掉顶部关卡进度条 (关 0/1 图标 banner 一起删) #}
  <div class="silk-stage">
    {% block content %}{% endblock %}
    <div><a class="silk-back" href="{{ url_for('silk_road_mode') }}">← 返回模式</a></div>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
