<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丝绸之路 · 到家了</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { background: #1b2135; color: #f4ecd8; }
    .silk-end {
      max-width: 640px; margin: 60px auto; padding: 40px 28px; text-align: center;
      border-radius: 18px; background: linear-gradient(160deg, #3a2140 0%, #1b2135 100%);
      box-shadow: 0 12px 44px rgba(0,0,0,.4);
    }
    .silk-end h1 { font-size: 34px; color: #ffd98a; }
    .silk-end .total { font-size: 48px; font-weight: 800; color: #a6e3a1; margin: 20px 0 6px; }
    .silk-end .poem { color: #a8d8c0; font-style: italic; line-height: 1.9; margin: 18px 0; }
    .silk-end a {
      display: inline-block; margin-top: 22px; padding: 12px 28px; border-radius: 999px;
      background: #f6b5c8; color: #2a2140; text-decoration: none; font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="silk-end">
    <h1>🎆 通关！你已到家</h1>
    <div class="total">¥{{ '%.2f' | format(total_reward) }}</div>
    <p style="color:#c9c2d8">这一路累计的情书总额（谐音「一生一世」）</p>
    <p class="poem">回家了<br>所有的路，都是为了走向你</p>
    <p style="color:#6c7086;font-size:13px">（M4 会在这里放烟花 + 终极大奖弹窗）</p>
    <a href="/games/silk-road/mode">再走一次 →</a>
  </div>
</body>
</html>
