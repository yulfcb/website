<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丝绸之路 · 世界地图</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      /* 古地图外圈：深棕木桌色背景，衬托羊皮纸主舞台 */
      background: radial-gradient(ellipse at 50% 30%, #3a2a1a 0%, #1a1208 80%);
      color: #3a2810;
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "STKaiti", "KaiTi", serif;
    }

    /* 顶部 bar */
    .wmp-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; max-width: 1280px; margin: 0 auto;
    }
    .wmp-back {
      color: #e8c896; text-decoration: none; font-size: 14px;
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid rgba(232, 200, 150, 0.5);
      transition: background .14s ease;
    }
    .wmp-back:hover { background: rgba(232, 200, 150, 0.12); }
    .wmp-title { font-size: 18px; color: #ffd98a; font-weight: 700; letter-spacing: 1px; }
    .wmp-cleared { font-size: 13px; color: #d8c8a8; }
    .wmp-cleared b { color: #ffd98a; }

    /* 主舞台 */
    .wmp-stage {
      max-width: 1280px; margin: 12px auto 40px; padding: 0 20px;
    }
    .wmp-svg-wrap {
      width: 100%; aspect-ratio: 16 / 9;
      background: #F5E8C8;
      border-radius: 14px;
      box-shadow: 0 14px 50px rgba(0,0,0,.55), inset 0 0 60px rgba(139, 90, 43, .15);
      overflow: hidden;
      position: relative;
      border: 3px solid #8B5A2B;
    }
    .wmp-svg-wrap svg {
      display: block; width: 100%; height: 100%;
    }

    /* marker 样式 */
    .slk-marker { cursor: pointer; transition: transform .18s ease; transform-origin: center; transform-box: fill-box; }
    .slk-marker:not(.locked):hover { transform: scale(1.12); }
    .slk-marker.locked { cursor: not-allowed; }
    .slk-marker.current .slk-marker-pulse {
      animation: slk-marker-pulse 1.6s ease-in-out infinite;
      transform-origin: center; transform-box: fill-box;
    }
    @keyframes slk-marker-pulse {
      0%,100% { opacity: 0.45; r: 28; }
      50%     { opacity: 0.0;  r: 42; }
    }

    /* 加载/出错 toast */
    #wmp-toast {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(74, 46, 26, 0.92); color: #ffd98a;
      padding: 8px 18px; border-radius: 999px; font-size: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.4); display: none;
      border: 1px solid rgba(255, 217, 138, 0.3); z-index: 50;
    }

    /* 底部说明条 */
    .wmp-legend {
      max-width: 1280px; margin: 18px auto 0; padding: 0 22px;
      display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
      color: #d8c8a8; font-size: 13px;
    }
    .wmp-legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .wmp-legend-swatch {
      display: inline-block; width: 14px; height: 14px; border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .sw-gold   { background: #ffd700; border: 2px solid #b8860b; }
    .sw-blue   { background: #5fb3a0; border: 2px solid #2f7a6c; }
    .sw-gray   { background: #a89878; border: 2px solid #6b5532; opacity: .65; }
    .sw-pulse  { background: #ffd700; border: 2px solid #ffd700; box-shadow: 0 0 0 4px rgba(255,215,0,.45); }

    /* 移动端 */
    @media (max-width: 720px) {
      .wmp-back { font-size: 12px; padding: 6px 10px; }
      .wmp-title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="wmp-topbar">
    <a class="wmp-back" href="{{ url_for('silk_road_mode') }}">← 返回路线选择</a>
    <div class="wmp-title">🗺️ 丝绸之路 · 世界地图</div>
    <div class="wmp-cleared" id="wmp-cleared-count">已通关 <b>0</b> / 6 关</div>
  </div>

  <div class="wmp-stage">
    <div class="wmp-svg-wrap">
      <div id="wmp-toast"></div>
      <svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" id="silkroad-world-map" role="img" aria-label="古丝绸之路世界地图 6 关路线 · 亚洲重点视角">
        <defs>
          <!-- 纸纹背景（米黄渐变） -->
          <radialGradient id="paperBg" cx="50%" cy="45%" r="75%">
            <stop offset="0%"   stop-color="#F7EBC9"/>
            <stop offset="55%"  stop-color="#EFD9A8"/>
            <stop offset="100%" stop-color="#C9A57B"/>
          </radialGradient>
          <!-- 陆地填充（奶油色） -->
          <linearGradient id="landFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#EFE0B8"/>
            <stop offset="100%" stop-color="#D9C088"/>
          </linearGradient>
          <!-- 沙漠填充（中东/中亚偏红黄） -->
          <linearGradient id="desertFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#E8C580"/>
            <stop offset="100%" stop-color="#C99656"/>
          </linearGradient>
          <!-- 海洋色调（背景里层） -->
          <linearGradient id="oceanFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#E8DBB0"/>
            <stop offset="100%" stop-color="#D7C088"/>
          </linearGradient>
          <!-- 极地冰雪 -->
          <linearGradient id="iceFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#F0F4F8"/>
            <stop offset="100%" stop-color="#C8D4DC"/>
          </linearGradient>

          <pattern id="paperTexture" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
            <rect width="14" height="14" fill="transparent"/>
            <circle cx="2"  cy="3"  r="0.5" fill="#A07A4B" opacity="0.18"/>
            <circle cx="9"  cy="2"  r="0.4" fill="#8B5A2B" opacity="0.14"/>
            <circle cx="5"  cy="8"  r="0.6" fill="#B08A5B" opacity="0.16"/>
            <circle cx="11" cy="11" r="0.4" fill="#8B5A2B" opacity="0.12"/>
            <circle cx="3"  cy="12" r="0.3" fill="#A07A4B" opacity="0.10"/>
          </pattern>

          <pattern id="landGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#B8956B" stroke-width="0.3" opacity="0.35"/>
          </pattern>

          <linearGradient id="silkPath" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#B8860B"/>
            <stop offset="40%"  stop-color="#FFD700"/>
            <stop offset="60%"  stop-color="#FFD98A"/>
            <stop offset="100%" stop-color="#C49A5E"/>
          </linearGradient>

          <filter id="routeGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
            <feFlood flood-color="#FFD700" flood-opacity="0.55"/>
            <feComposite in2="coloredBlur" operator="in"/>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <filter id="goldShine" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feFlood flood-color="#FFD700" flood-opacity="0.7"/>
            <feComposite in2="b" operator="in"/>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <filter id="markerShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#3a2010" flood-opacity="0.55"/>
          </filter>

          <linearGradient id="compassFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#F5E8C8"/>
            <stop offset="100%" stop-color="#C9A57B"/>
          </linearGradient>

          <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
            <stop offset="60%" stop-color="#000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#3a2010" stop-opacity="0.45"/>
          </radialGradient>
        </defs>

        <!-- 1. 纸背景 -->
        <rect x="0" y="0" width="1280" height="720" fill="url(#paperBg)"/>
        <rect x="0" y="0" width="1280" height="720" fill="url(#paperTexture)"/>
        <rect x="0" y="0" width="1280" height="720" fill="url(#vignette)"/>

        <!-- 2. 经纬网 + 海洋（由 JS 渲染） -->
        <g id="ocean-layer" fill="url(#oceanFill)" opacity="0.5"></g>
        <g id="graticule-layer" stroke="#B8956B" stroke-width="0.4" opacity="0.45" stroke-dasharray="3,3" fill="none"></g>

        <!-- 3. 真实国家轮廓（Natural Earth via TopoJSON，由 JS 渲染） -->
        <g id="real-countries" stroke="#6B4423" stroke-width="0.7" stroke-linejoin="round" fill="url(#landFill)"></g>

        <!-- 4. 国名/地名标签（由 JS 渲染，只标丝绸之路关键国家/城市） -->
        <g id="country-labels" fill="#5C3A1E" font-family="STKaiti, KaiTi, serif" opacity="0.85"></g>

        <!-- 5. 丝绸之路背景虚线（一直显示全段，灰色虚线表示未走完） -->
        <path id="silk-road-bg"
              d=""
              fill="none" stroke="#8B5A2B" stroke-width="2.5" stroke-dasharray="6,8"
              opacity="0.55" stroke-linecap="round"/>

        <!-- 6. 主路径（金色实线，由 JS 控制 dashoffset 显示已通关段） -->
        <path id="silk-road-main"
              d=""
              fill="none" stroke="url(#silkPath)" stroke-width="4.5" stroke-linecap="round"
              filter="url(#routeGlow)" opacity="0"/>

        <!-- 7. 骆驼脚印装饰 -->
        <g id="silk-road-footprints" opacity="0.55"></g>

        <!-- 8. 罗盘玫瑰 -->
        <g id="compass-rose" transform="translate(1130, 110)">
          <circle r="44" fill="url(#compassFill)" stroke="#6B4423" stroke-width="1.5" opacity="0.92"/>
          <circle r="38" fill="none" stroke="#8B5A2B" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.6"/>
          <circle r="30" fill="none" stroke="#8B5A2B" stroke-width="0.4" opacity="0.5"/>
          <g stroke="#6B4423" stroke-width="1" stroke-linejoin="round">
            <polygon points="0,-38 5,0 0,6 -5,0" fill="#8B5A2B"/>
            <polygon points="0,38 5,0 0,-6 -5,0" fill="#D9C088" stroke="#6B4423"/>
            <polygon points="38,0 0,5 -6,0 0,-5" fill="#C49A5E"/>
            <polygon points="-38,0 0,5 6,0 0,-5" fill="#C49A5E"/>
            <polygon points="22,-22 0,-3 -3,0" fill="#E8C580"/>
            <polygon points="-22,-22 0,-3 3,0" fill="#E8C580"/>
            <polygon points="22,22 0,3 -3,0" fill="#E8C580"/>
            <polygon points="-22,22 0,3 3,0" fill="#E8C580"/>
          </g>
          <circle r="4" fill="#6B4423"/>
          <circle r="2" fill="#FFD700"/>
          <g fill="#4A2E1A" font-family="Georgia, serif" font-weight="700" text-anchor="middle">
            <text x="0"  y="-46" font-size="13">N</text>
            <text x="0"  y="55"  font-size="11">S</text>
            <text x="50" y="4"   font-size="11">E</text>
            <text x="-50" y="4"  font-size="11">W</text>
          </g>
          <g fill="#6B4423" font-family="STKaiti, KaiTi, serif" font-size="9" text-anchor="middle" opacity="0.8">
            <text x="0"  y="-32">北</text>
            <text x="0"  y="42">南</text>
            <text x="34" y="3">東</text>
            <text x="-34" y="3">西</text>
          </g>
        </g>

        <!-- 9. 地图中央标题（古风字卡） -->
        <g transform="translate(640, 70)">
          <rect x="-260" y="-26" width="520" height="48" rx="6"
                fill="#F5E8C8" stroke="#8B5A2B" stroke-width="1.5" opacity="0.85"/>
          <rect x="-256" y="-22" width="512" height="40" rx="4"
                fill="none" stroke="#B8860B" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7"/>
          <text x="0" y="6" text-anchor="middle" font-family="STKaiti, KaiTi, serif"
                font-size="22" font-weight="700" fill="#4A2E1A" letter-spacing="6">
            🌍 陸 上 絲 綢 之 路 · The Silk Road
          </text>
        </g>

        <!-- 10. 角落装饰（古地图花边） -->
        <g stroke="#8B5A2B" stroke-width="1.2" fill="none" opacity="0.65">
          <path d="M 20,40 L 60,40 M 40,20 L 40,60 M 20,20 Q 40,20 40,40"/>
          <path d="M 1220,40 L 1260,40 M 1240,20 L 1240,60 M 1260,20 Q 1240,20 1240,40"/>
          <path d="M 20,680 L 60,680 M 40,660 L 40,700 M 20,700 Q 40,700 40,680"/>
          <path d="M 1220,680 L 1260,680 M 1240,660 L 1240,700 M 1260,700 Q 1260,680 1240,680"/>
        </g>

        <!-- 11. 章印红印 -->
        <g transform="translate(1085, 640) rotate(-8)" opacity="0.55">
          <rect x="-30" y="-30" width="60" height="60" fill="none" stroke="#9B2C2C" stroke-width="2.5"/>
          <rect x="-26" y="-26" width="52" height="52" fill="none" stroke="#9B2C2C" stroke-width="1"/>
          <text x="0" y="6" text-anchor="middle" font-family="STKaiti, KaiTi, serif"
                font-size="20" font-weight="900" fill="#9B2C2C" letter-spacing="2">絲路</text>
        </g>

        <!-- 12. 6 关 marker (由 JS 填充) -->
        <g id="silkroad-markers"></g>
      </svg>
    </div>

    <div class="wmp-legend">
      <div class="wmp-legend-item"><span class="wmp-legend-swatch sw-gold"></span>已通关</div>
      <div class="wmp-legend-item"><span class="wmp-legend-swatch sw-pulse"></span>当前位置</div>
      <div class="wmp-legend-item"><span class="wmp-legend-swatch sw-gray"></span>未通关</div>
    </div>
  </div>

  <!-- Vendor libs (server-cached, no runtime CDN dependency) -->
  <script src="/static/vendor/world-atlas/d3-array.min.js"></script>
  <script src="/static/vendor/world-atlas/topojson-client.min.js"></script>
  <script src="/static/vendor/world-atlas/d3-geo.min.js"></script>

  <script>
    // ===== 关卡真实地理 (lng, lat) =====
    var LEVEL_META = [
      { id: 0, title: {{ config.levels[0].title | tojson }}, lng: 51.53, lat: 25.30, vehicle: {{ (config.levels[0].vehicle or '🛳️') | tojson }}, place: '卡塔爾·多哈' },
      { id: 1, title: {{ config.levels[1].title | tojson }}, lng: 51.67, lat: 32.65, vehicle: {{ (config.levels[1].vehicle or '🐪') | tojson }}, place: '伊朗·伊斯法罕' },
      { id: 2, title: {{ config.levels[2].title | tojson }}, lng: 28.97, lat: 41.01, vehicle: {{ (config.levels[2].vehicle or '🎈') | tojson }}, place: '土耳其·伊斯坦堡' },
      { id: 3, title: {{ config.levels[3].title | tojson }}, lng: 71.45, lat: 51.17, vehicle: {{ (config.levels[3].vehicle or '🐎') | tojson }}, place: '哈薩克·阿斯塔納' },
      { id: 4, title: {{ config.levels[4].title | tojson }}, lng: 87.62, lat: 43.83, vehicle: {{ (config.levels[4].vehicle or '🏂') | tojson }}, place: '新疆·烏魯木齊' },
      { id: 5, title: {{ config.levels[5].title | tojson }}, lng: 104.07, lat: 30.67, vehicle: {{ (config.levels[5].vehicle or '🏠') | tojson }}, place: '成都·到家' },
    ];

    // 国名/地名标签 (中文 + 罗马, lng/lat 位置)
    var COUNTRY_LABELS = [
      { name: '沙特阿拉伯', sub: 'Saudi Arabia', lng: 45.0, lat: 24.0 },
      { name: '印度', sub: 'India', lng: 78.0, lat: 22.0 },
      { name: '蒙古', sub: 'Mongolia', lng: 102.0, lat: 46.5 },
      { name: '俄羅斯', sub: 'Russia', lng: 80.0, lat: 60.5 },
      { name: '歐洲', sub: 'Europe', lng: 15.0, lat: 50.0, fontsize: 16 },
      { name: '非洲', sub: 'Africa', lng: 23.0, lat: 5.0, fontsize: 16 },
      { name: '波斯灣', sub: 'Persian Gulf', lng: 51.0, lat: 27.5, fontsize: 11, fill: '#3A5F7A' },
      { name: '地中海', sub: 'Mediterranean', lng: 25.0, lat: 36.0, fontsize: 11, fill: '#3A5F7A' },
      { name: '裏海', sub: 'Caspian', lng: 50.5, lat: 41.0, fontsize: 9, fill: '#3A5F7A' },
    ];

    var SVG_NS = 'http://www.w3.org/2000/svg';

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function showToast(msg, ms) {
      var t = document.getElementById('wmp-toast');
      if (!t) return;
      t.innerText = msg;
      t.style.display = 'block';
      setTimeout(function() { t.style.display = 'none'; }, ms || 2500);
    }

    function getCleared() {
      try { return JSON.parse(localStorage.getItem('silkroad_cleared_levels') || '[]'); }
      catch (e) { return []; }
    }
    function getCurrentLevel() {
      if (typeof window.LEVEL_ID === 'number') return window.LEVEL_ID;
      var m = (window.location.pathname || '').match(/\/level\/(\d+)/);
      return m ? parseInt(m[1], 10) : null;
    }

    // —— d3-mercator projection, Asia-centred, fit Asia + Middle East ——
    // 调整: 中心 [60°E, 32°N], scale 适配 1280x720 画布
    function buildProjection() {
      return d3.geoMercator()
        .center([60, 32])
        .scale(440)
        .translate([640, 360]);
    }

    function el(name, attrs, children) {
      var node = document.createElementNS(SVG_NS, name);
      if (attrs) Object.keys(attrs).forEach(function(k){ node.setAttribute(k, attrs[k]); });
      if (children) children.forEach(function(c){ node.appendChild(c); });
      return node;
    }

    function renderProjectionLayers(topoGeo) {
      var proj = buildProjection();
      var path = d3.geoPath(proj);

      // —— 海洋轮廓 (用陆地反向 outline - 用 sphere) ——
      var sphere = el('path', {
        d: path({type: 'Sphere'}),
        fill: 'url(#oceanFill)',
        stroke: 'none',
      });
      document.getElementById('ocean-layer').appendChild(sphere);

      // —— 经纬网 (10° 间隔) ——
      var grat = d3.geoGraticule10();
      var gratPath = el('path', {
        d: path(grat),
        fill: 'none',
        stroke: '#B8956B',
        'stroke-width': '0.4',
        'stroke-dasharray': '3,3',
        opacity: '0.45',
      });
      document.getElementById('graticule-layer').appendChild(gratPath);

      // —— 国家轮廓 ——
      var countriesG = document.getElementById('real-countries');
      // 重点国家加沙漠色 (中东+中亚)
      var DESERT_NAMES = new Set([
        'Saudi Arabia','United Arab Emirates','Qatar','Bahrain','Kuwait',
        'Oman','Yemen','Iran','Iraq','Jordan','Syria','Israel','Egypt',
        'Turkmenistan','Uzbekistan','Kazakhstan','Afghanistan','Pakistan',
        'Western Sahara','Mauritania','Algeria','Libya','Sudan','Mali','Niger','Chad',
      ]);
      topoGeo.features.forEach(function(f) {
        var p = el('path', {
          d: path(f),
          fill: DESERT_NAMES.has(f.properties.name) ? 'url(#desertFill)' : 'url(#landFill)',
          stroke: '#6B4423',
          'stroke-width': '0.7',
          'stroke-linejoin': 'round',
        });
        countriesG.appendChild(p);
        // 海平面叠加 grid pattern
        p.addEventListener && (function(){});
      });

      // —— 国名标签 ——
      var labelsG = document.getElementById('country-labels');
      COUNTRY_LABELS.forEach(function(c) {
        var xy = proj([c.lng, c.lat]);
        if (!xy || isNaN(xy[0]) || isNaN(xy[1])) return;
        var t1 = el('text', {
          x: xy[0], y: xy[1],
          'text-anchor': 'middle',
          'font-size': c.fontsize || 13,
          'font-weight': c.fontsize === 16 ? '800' : '700',
          fill: c.fill || '#5C3A1E',
          'stroke': '#F5E8C8', 'stroke-width': '3', 'paint-order': 'stroke',
          opacity: c.fill === '#3A5F7A' ? '0.85' : '0.92',
        });
        t1.textContent = c.name;
        labelsG.appendChild(t1);

        if (c.sub) {
          var t2 = el('text', {
            x: xy[0], y: xy[1] + (c.fontsize === 16 ? 14 : 12),
            'text-anchor': 'middle',
            'font-size': c.fontsize === 16 ? 9 : 8,
            fill: '#7B5532',
            'stroke': '#F5E8C8', 'stroke-width': '2.5', 'paint-order': 'stroke',
            opacity: 0.7,
            'font-family': 'Georgia, serif',
            'font-style': 'italic',
          });
          t2.textContent = c.sub;
          labelsG.appendChild(t2);
        }
      });

      return proj;
    }

    function buildSilkPathD(proj, markerXY) {
      // 用 quadratic Bezier 在两个城市间加微弯, 模拟丝路弧线
      var parts = [];
      for (var i = 0; i < markerXY.length - 1; i++) {
        var p1 = markerXY[i], p2 = markerXY[i+1];
        var mx = (p1[0] + p2[0]) / 2;
        // 弯朝左/右下, 跟 marker sequence 走向
        var dy = (p2[1] - p1[1]) - 12;  // 微微弯
        var cx = mx + (i % 2 === 0 ? -10 : 10);
        var cy = (p1[1] + p2[1]) / 2 + dy * 0.5;
        parts.push('M ' + p1[0].toFixed(1) + ' ' + p1[1].toFixed(1) + ' Q ' + cx.toFixed(1) + ' ' + cy.toFixed(1) + ' ' + p2[0].toFixed(1) + ' ' + p2[1].toFixed(1));
      }
      return parts.join(' ');
    }

    function renderMarkers(proj) {
      var cleared = getCleared();
      var current = getCurrentLevel();
      var clearedSet = {};
      cleared.forEach(function (n) { clearedSet[n] = true; });

      var markerXY = [];
      LEVEL_META.forEach(function(lv) {
        var xy = proj([lv.lng, lv.lat]);
        markerXY.push(xy);
      });

      var silkD = buildSilkPathD(proj, markerXY);
      document.getElementById('silk-road-bg').setAttribute('d', silkD);
      document.getElementById('silk-road-main').setAttribute('d', silkD);

      // 沿 path 7 个骆驼脚印 (沿 silk road 取 7 个等距点)
      var fg = document.getElementById('silk-road-footprints');
      fg.innerHTML = '';
      var bgPath = document.getElementById('silk-road-bg');
      var totalLen = bgPath.getTotalLength ? bgPath.getTotalLength() : 0;
      for (var i = 1; i <= 7; i++) {
        var t = i / 8;
        var pt = bgPath.getPointAtLength(totalLen * t);
        var fgEl = el('ellipse', {
          cx: pt.x, cy: pt.y,
          rx: 2.5, ry: 3.5,
          fill: '#6B4423',
          transform: 'rotate(' + Math.round(Math.random() * 90 - 45) + ' ' + pt.x + ' ' + pt.y + ')',
        });
        fg.appendChild(fgEl);
      }

      // 6 关 marker
      var g = document.getElementById('silkroad-markers');
      g.innerHTML = '';
      var svg = '';
      LEVEL_META.forEach(function (lv, idx) {
        var clearedLv = !!clearedSet[lv.id];
        var isCurrent = lv.id === current;
        // M11 part 4 — 关 0→关 1 gating: 关 1 marker 必须 cleared[0] === true 才能去
        var clickable;
        if (lv.id === 1) {
          clickable = clearedSet[0] === true || clearedLv;
        } else if (lv.id > 1) {
          // 关 2-5 维持现状 (不全 gating 避免 locked 链)
          clickable = clearedLv || isCurrent;
        } else {
          // 关 0 一直能去
          clickable = clearedLv || isCurrent;
        }
        var xy = markerXY[idx];

        var fill, stroke, strokeOpacity, lockClass;
        if (isCurrent) {
          fill = '#FFD700'; stroke = '#5C3A1E'; strokeOpacity = 1;
          lockClass = 'current';
        } else if (clearedLv) {
          fill = '#D4A857'; stroke = '#5C3A1E'; strokeOpacity = 1;
          lockClass = '';
        } else {
          fill = '#EFE0B8'; stroke = '#8B5A2B'; strokeOpacity = 0.85;
          lockClass = 'locked';
        }

        var href = clickable ? ('/games/silk-road/level/' + lv.id) : 'javascript:void(0)';

        svg += ''
          + '<g class="slk-marker ' + lockClass + '" data-level="' + lv.id + '" '
          +     'data-clickable="' + (clickable ? '1' : '0') + '" '
          +     'role="link" tabindex="0" aria-label="' + esc('关 ' + lv.id + ' · ' + lv.title) + '">'
          +   (isCurrent ? '<circle class="slk-marker-pulse" cx="' + xy[0].toFixed(1) + '" cy="' + xy[1].toFixed(1) + '" r="28" fill="none" stroke="#FFD700" stroke-width="3"/>' : '')
          +   '<circle cx="' + xy[0].toFixed(1) + '" cy="' + xy[1].toFixed(1) + '" r="22" fill="#8B5A2B" stroke="#5C3A1E" stroke-width="2" filter="url(#markerShadow)"/>'
          +   '<circle cx="' + xy[0].toFixed(1) + '" cy="' + xy[1].toFixed(1) + '" r="17" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1.5" opacity="' + strokeOpacity + '"/>'
          +   '<text x="' + xy[0].toFixed(1) + '" y="' + (xy[1] + 6).toFixed(1) + '" text-anchor="middle" font-size="20" font-family="-apple-system, sans-serif">' + esc(lv.vehicle) + '</text>'
          +   '<text x="' + xy[0].toFixed(1) + '" y="' + (xy[1] - 30).toFixed(1) + '" text-anchor="middle" font-size="12" font-weight="800" fill="#F5E8C8" stroke="#5C3A1E" stroke-width="3" paint-order="stroke">第 ' + lv.id + ' 關</text>'
          +   '<text x="' + xy[0].toFixed(1) + '" y="' + (xy[1] + 42).toFixed(1) + '" text-anchor="middle" font-size="13" font-weight="700" fill="#5C3A1E" stroke="#F5E8C8" stroke-width="3.5" paint-order="stroke">' + esc(lv.title) + '</text>'
          +   '<text x="' + xy[0].toFixed(1) + '" y="' + (xy[1] + 58).toFixed(1) + '" text-anchor="middle" font-size="11" fill="#6B4423" stroke="#F5E8C8" stroke-width="2.5" paint-order="stroke">' + esc(lv.place) + '</text>'
          +   (clearedLv ? '<text x="' + (xy[0] + 18).toFixed(1) + '" y="' + (xy[1] - 14).toFixed(1) + '" text-anchor="middle" font-size="16">✅</text>' : '')
          + '</g>';
      });
      g.innerHTML = svg;

      // 路径金色实线段（用 dashoffset 显已通关部分）
      var maxCleared = -1;
      cleared.forEach(function (n) { if (n > maxCleared) maxCleared = n; });
      var maxDrawn = Math.max(maxCleared, current != null ? current : -1);
      var mainPath = document.getElementById('silk-road-main');
      if (mainPath && maxDrawn >= 0 && LEVEL_META.length >= 2) {
        var len = mainPath.getTotalLength ? mainPath.getTotalLength() : 0;
        if (len > 0) {
          var totalSegs = LEVEL_META.length - 1;
          var drawSegs = Math.max(0, Math.min(totalSegs, maxDrawn));
          var ratio = drawSegs / totalSegs;
          mainPath.style.opacity = '1';
          mainPath.setAttribute('stroke-dasharray', len);
          mainPath.setAttribute('stroke-dashoffset', String(len * (1 - ratio)));
        }
      }

      // marker click handlers
      var allM = document.querySelectorAll('#silkroad-markers .slk-marker');
      allM.forEach(function (m) {
        var lv = parseInt(m.getAttribute('data-level'), 10);
        var clickable = m.getAttribute('data-clickable') === '1';
        if (clickable) {
          m.addEventListener('click', function () {
            window.location.href = '/games/silk-road/level/' + lv;
          });
          m.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              window.location.href = '/games/silk-road/level/' + lv;
            }
          });
        } else {
          m.addEventListener('click', function (e) {
            e.preventDefault();
            // M11 part 4 — 关 1 locked toast: 必须通关关 0 才去
            if (lv === 1) {
              showToast('请先通关关 0 才能去关 1 (this.merchantShown 已经清空)');
            }
            m.style.transition = 'transform .1s ease';
            m.setAttribute('transform', 'translate(2 0)');
            setTimeout(function () { m.setAttribute('transform', 'translate(-2 0)'); }, 80);
            setTimeout(function () { m.setAttribute('transform', 'translate(0 0)'); }, 160);
          });
        }
      });

      // 已通关计数
      var cc = document.getElementById('wmp-cleared-count');
      if (cc) cc.innerHTML = '已通关 <b>' + cleared.length + '</b> / 6 关';
    }

    async function init() {
      try {
        if (!window.d3 || !window.topojson) {
          showToast('地图库加载失败,请刷新页面');
          return;
        }
        var topo = await fetch('/static/vendor/world-atlas/countries-110m.json').then(function(r){
          if (!r.ok) throw new Error('fetch topo failed: ' + r.status);
          return r.json();
        });
        var geo = topojson.feature(topo, topo.objects.countries);
        var proj = renderProjectionLayers(geo);
        renderMarkers(proj);
        showToast('地图已加载 · 丝绸之路共 6 关');
      } catch (e) {
        console.error(e);
        showToast('地图渲染失败: ' + e.message, 5000);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    window.addEventListener('storage', function (e) {
      if (e.key === 'silkroad_cleared_levels') {
        // re-render markers only (projection stays the same)
        var proj = buildProjection();
        renderMarkers(proj);
      }
    });
  </script>
</body>
</html>
