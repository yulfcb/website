<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丝绸之路 · 世界地图</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      /* 古地图外圈：深棕木桌色背景，衬托羊皮纸主舞台 */
      background: radial-gradient(ellipse at 50% 30%, #3a2a1a 0%, #1a1208 80%);
      color: #3a2810;
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "STKaiti", "KaiTi", serif;
    }

    /* 顶部 bar */
    .wmp-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; max-width: 1280px; margin: 0 auto;
    }
    .wmp-back {
      color: #e8c896; text-decoration: none; font-size: 14px;
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid rgba(232, 200, 150, 0.5);
      transition: background .14s ease;
    }
    .wmp-back:hover { background: rgba(232, 200, 150, 0.12); }
    .wmp-title { font-size: 18px; color: #ffd98a; font-weight: 700; letter-spacing: 1px; }
    .wmp-cleared { font-size: 13px; color: #d8c8a8; }
    .wmp-cleared b { color: #ffd98a; }

    /* 主舞台 */
    .wmp-stage {
      max-width: 1280px; margin: 12px auto 40px; padding: 0 20px;
    }
    .wmp-svg-wrap {
      width: 100%; aspect-ratio: 16 / 9;
      background: #F5E8C8;
      border-radius: 14px;
      box-shadow: 0 14px 50px rgba(0,0,0,.55), inset 0 0 60px rgba(139, 90, 43, .15);
      overflow: hidden;
      position: relative;
      border: 3px solid #8B5A2B;
    }
    .wmp-svg-wrap svg {
      display: block; width: 100%; height: 100%;
    }

    /* marker 样式（古地图驿站风：深棕圈 / 金黄内 / 白心 / 汉字标号） */
    .slk-marker { cursor: pointer; transition: transform .18s ease; transform-origin: center; transform-box: fill-box; }
    .slk-marker:not(.locked):hover { transform: scale(1.12); }
    .slk-marker.locked { cursor: not-allowed; }
    .slk-marker.current .slk-marker-pulse {
      animation: slk-marker-pulse 1.6s ease-in-out infinite;
      transform-origin: center; transform-box: fill-box;
    }
    @keyframes slk-marker-pulse {
      0%,100% { opacity: 0.45; r: 28; }
      50%     { opacity: 0.0;  r: 42; }
    }

    /* 底部说明条 */
    .wmp-legend {
      max-width: 1280px; margin: 18px auto 0; padding: 0 22px;
      display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
      color: #d8c8a8; font-size: 13px;
    }
    .wmp-legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .wmp-legend-swatch {
      display: inline-block; width: 14px; height: 14px; border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .sw-gold   { background: #ffd700; border: 2px solid #b8860b; }
    .sw-blue   { background: #5fb3a0; border: 2px solid #2f7a6c; }
    .sw-gray   { background: #a89878; border: 2px solid #6b5532; opacity: .65; }
    .sw-pulse  { background: #ffd700; border: 2px solid #ffd700; box-shadow: 0 0 0 4px rgba(255,215,0,.45); }

    /* 移动端 */
    @media (max-width: 720px) {
      .wmp-topbar { padding: 10px 14px; }
      .wmp-svg-wrap { aspect-ratio: auto; min-height: 360px; }
    }
  </style>
</head>
<body>

    <a class="wmp-back" href="{{ url_for('silk_road_mode') }}">← 返回路线选择</a>

            <stop offset="100%" stop-color="#C99656"/>

            <stop offset="0%"   stop-color="#F0F4F8"/>
            <stop offset="100%" stop-color="#C8D4DC"/>

          <!-- 纸纤维点状纹理 -->

            <circle cx="9"  cy="2"  r="0.4" fill="#8B5A2B" opacity="0.14"/>
            <circle cx="5"  cy="8"  r="0.6" fill="#B08A5B" opacity="0.16"/>
            <circle cx="11" cy="11" r="0.4" fill="#8B5A2B" opacity="0.12"/>

          <!-- 大陆内部网格纹理（更密的细线） -->

          <!-- 金色丝绸之路路径渐变 -->

            <stop offset="40%"  stop-color="#FFD700"/>
            <stop offset="60%"  stop-color="#FFD98A"/>
            <stop offset="100%" stop-color="#C49A5E"/>
          </linearGradient>

          <!-- 路径阴影光晕（柔金光） -->
          <filter id="routeGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
            <feFlood flood-color="#FFD700" flood-opacity="0.55"/>
            <feComposite in2="coloredBlur" operator="in"/>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- 已通关金标柔光 -->
          <filter id="goldShine" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feFlood flood-color="#FFD700" flood-opacity="0.7"/>
            <feComposite in2="b" operator="in"/>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- 标记点阴影 -->
          <filter id="markerShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#3a2010" flood-opacity="0.55"/>
          </filter>

          <!-- 罗盘玫瑰梯度 -->

            <stop offset="0%"   stop-color="#F5E8C8"/>
            <stop offset="100%" stop-color="#C9A57B"/>
          </linearGradient>

            <!-- 西 -->
            <polygon points="-38,0 0,5 6,0 0,-5" fill="#C49A5E"/>
            <!-- 东北 -->
            <polygon points="22,-22 0,-3 -3,0" fill="#E8C580"/>
            <!-- 西北 -->
            <polygon points="-22,-22 0,-3 3,0" fill="#E8C580"/>
            <!-- 东南 -->
            <polygon points="22,22 0,3 -3,0" fill="#E8C580"/>
            <!-- 西南 -->
            <polygon points="-22,22 0,3 3,0" fill="#E8C580"/>
          </g>
          <!-- 中心 -->
          <circle r="4" fill="#6B4423"/>
          <circle r="2" fill="#FFD700"/>
          <!-- N/S/E/W 文字 -->
          <g fill="#4A2E1A" font-family="Georgia, serif" font-weight="700" text-anchor="middle">
            <text x="0"  y="-46" font-size="13">N</text>
            <text x="0"  y="55"  font-size="11">S</text>
            <text x="50" y="4"   font-size="11">E</text>
            <text x="-50" y="4"  font-size="11">W</text>
          </g>
          <!-- 中文方位 -->
          <g fill="#6B4423" font-family="STKaiti, KaiTi, serif" font-size="9" text-anchor="middle" opacity="0.8">
            <text x="0"  y="-32">北</text>
            <text x="0"  y="42">南</text>
            <text x="34" y="3">東</text>
            <text x="-34" y="3">西</text>
          </g>
        </g>

        <!-- 10. 地图中央标题（古风字卡） -->
        <g transform="translate(640, 70)">
          <rect x="-260" y="-26" width="520" height="48" rx="6"
                fill="#F5E8C8" stroke="#8B5A2B" stroke-width="1.5" opacity="0.85"/>
          <rect x="-256" y="-22" width="512" height="40" rx="4"
                fill="none" stroke="#B8860B" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7"/>
          <text x="0" y="6" text-anchor="middle" font-family="STKaiti, KaiTi, serif"
                font-size="22" font-weight="700" fill="#4A2E1A" letter-spacing="6">
            🌍 陸 上 絲 綢 之 路 · The Silk Road
          </text>
        </g>

        <!-- 11. 角落装饰（古地图花边） -->
        <g stroke="#8B5A2B" stroke-width="1.2" fill="none" opacity="0.65">
          <!-- 左上角 -->
          <path d="M 20,40 L 60,40 M 40,20 L 40,60 M 20,20 Q 40,20 40,40"/>
          <!-- 右上角 -->
          <path d="M 1220,40 L 1260,40 M 1240,20 L 1240,60 M 1260,20 Q 1240,20 1240,40"/>
          <!-- 左下角 -->
          <path d="M 20,680 L 60,680 M 40,660 L 40,700 M 20,700 Q 40,700 40,680"/>
          <!-- 右下角 -->
          <path d="M 1220,680 L 1260,680 M 1240,660 L 1240,700 M 1260,700 Q 1240,700 1240,680"/>
        </g>
        <!-- 图章红印 -->
        <g transform="translate(1085, 640) rotate(-8)" opacity="0.55">
          <rect x="-30" y="-30" width="60" height="60" fill="none" stroke="#9B2C2C" stroke-width="2.5"/>
          <rect x="-26" y="-26" width="52" height="52" fill="none" stroke="#9B2C2C" stroke-width="1"/>
          <text x="0" y="6" text-anchor="middle" font-family="STKaiti, KaiTi, serif"
                font-size="20" font-weight="900" fill="#9B2C2C" letter-spacing="2">絲路</text>
        </g>

        <!-- 12. 6 关城市 marker 容器（由 JS 填充） -->
        <g id="silkroad-markers"></g>
      </svg>
    </div>

    <div class="wmp-legend">
      <div class="wmp-legend-item"><span class="wmp-legend-swatch sw-gold"></span>已通关</div>
      <div class="wmp-legend-item"><span class="wmp-legend-swatch sw-blue"></span>当前所在</div>
      <div class="wmp-legend-item"><span class="wmp-legend-swatch sw-pulse"></span>当前位置</div>
      <div class="wmp-legend-item"><span class="wmp-legend-swatch sw-gray"></span>未通关</div>
    </div>
  </div>

  <script>
    // ===== 关卡定义（与 data/game_config.json + progress.js LEVEL_META 同步） =====
    // 坐标与上方 SVG silk-road-bg / silk-road-main 路径对齐
    // 注意: 关 5 vehicle 在 config 是 ""，这里用 🏠 兜底显示
    var LEVEL_META = [
      { id: 0, title: {{ config.levels[0].title | tojson }},     cx: 740,  cy: 395, vehicle: {{ (config.levels[0].vehicle or '🛳️') | tojson }}, place: '卡塔爾·多哈' },
      { id: 1, title: {{ config.levels[1].title | tojson }},     cx: 790,  cy: 330, vehicle: {{ (config.levels[1].vehicle or '🐪') | tojson }}, place: '伊朗·沙漠' },
      { id: 2, title: {{ config.levels[2].title | tojson }},     cx: 890,  cy: 255, vehicle: {{ (config.levels[2].vehicle or '🎈') | tojson }}, place: '土耳其' },
      { id: 3, title: {{ config.levels[3].title | tojson }},     cx: 960,  cy: 200, vehicle: {{ (config.levels[3].vehicle or '🐎') | tojson }}, place: '哈薩克·草原' },
      { id: 4, title: {{ config.levels[4].title | tojson }},     cx: 1075, cy: 225, vehicle: {{ (config.levels[4].vehicle or '🏂') | tojson }}, place: '新疆·雪山' },
      { id: 5, title: {{ config.levels[5].title | tojson }},     cx: 1145, cy: 290, vehicle: {{ (config.levels[5].vehicle or '🏠') | tojson }}, place: '成都·到家' },
    ];

    // 安全转义
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function getCleared() {
      try { return JSON.parse(localStorage.getItem('silkroad_cleared_levels') || '[]'); }
      catch (e) { return []; }
    }
    function getCurrentLevel() {
      if (typeof window.LEVEL_ID === 'number') return window.LEVEL_ID;
      var m = (window.location.pathname || '').match(/\/level\/(\d+)/);
      return m ? parseInt(m[1], 10) : null;
    }

    function renderMarkers() {
      var cleared = getCleared();
      var current = getCurrentLevel();
      var clearedSet = {};
      cleared.forEach(function (n) { clearedSet[n] = true; });

      var g = document.getElementById('silkroad-markers');
      if (!g) return;

      // 6 个 marker（古地图驿站风格：深棕外圈 / 金黄内圈 / 白心 / vehicle emoji）
      var svg = '';
      LEVEL_META.forEach(function (lv) {
        var clearedLv = !!clearedSet[lv.id];
        var isCurrent = lv.id === current;
        // 当前关（lastVisited）也算可点，且高亮
        var clickable = clearedLv || isCurrent;

        // 三态配色（羊皮纸古风：棕/金/灰）
        var fill, stroke, strokeOpacity, numColor, numStroke, lockClass;
        if (isCurrent) {
          // 当前所在：金边金内，强烈发光（用翡翠绿区分未通关）
          fill = '#FFD700'; stroke = '#5C3A1E'; strokeOpacity = 1;
          numColor = '#5C3A1E'; numStroke = 'none';
          lockClass = 'current';
        } else if (clearedLv) {
          // 已通关：暗金色 + 深棕边
          fill = '#D4A857'; stroke = '#5C3A1E'; strokeOpacity = 1;
          numColor = '#3A2010'; numStroke = 'none';
          lockClass = '';
        } else {
          // 未通关：羊皮色 + 浅棕边（不灰得太死，因为是古地图）
          fill = '#EFE0B8'; stroke = '#8B5A2B'; strokeOpacity = 0.85;
          numColor = '#6B4423'; numStroke = 'none';
          lockClass = 'locked';
        }

        var href = clickable ? ('/games/silk-road/level/' + lv.id) : 'javascript:void(0)';

        svg += ''
          + '<g class="slk-marker ' + lockClass + '" data-level="' + lv.id + '" '
          +     'data-clickable="' + (clickable ? '1' : '0') + '" '
          +     'role="link" tabindex="0" aria-label="' + esc('关 ' + lv.id + ' · ' + lv.title) + '">'
          +   (isCurrent ? '<circle class="slk-marker-pulse" cx="' + lv.cx + '" cy="' + lv.cy + '" r="28" fill="none" stroke="#FFD700" stroke-width="3"/>' : '')
          +   '<circle cx="' + lv.cx + '" cy="' + lv.cy + '" r="22" fill="#8B5A2B" stroke="#5C3A1E" stroke-width="2" filter="url(#markerShadow)"/>'
          +   '<circle cx="' + lv.cx + '" cy="' + lv.cy + '" r="17" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1.5" opacity="' + strokeOpacity + '"/>'
          +   '<text x="' + lv.cx + '" y="' + (lv.cy + 6) + '" text-anchor="middle" font-size="20" font-family="-apple-system, sans-serif">' + esc(lv.vehicle) + '</text>'
          +   '<text x="' + lv.cx + '" y="' + (lv.cy - 30) + '" text-anchor="middle" font-size="12" font-weight="800" fill="#F5E8C8" stroke="#5C3A1E" stroke-width="3" paint-order="stroke">第 ' + lv.id + ' 關</text>'
          +   '<text x="' + lv.cx + '" y="' + (lv.cy + 42) + '" text-anchor="middle" font-size="13" font-weight="700" fill="#5C3A1E" stroke="#F5E8C8" stroke-width="3.5" paint-order="stroke">' + esc(lv.title) + '</text>'
          +   '<text x="' + lv.cx + '" y="' + (lv.cy + 58) + '" text-anchor="middle" font-size="11" fill="#6B4423" stroke="#F5E8C8" stroke-width="2.5" paint-order="stroke">' + esc(lv.place) + '</text>'
          +   (clearedLv ? '<text x="' + (lv.cx + 18) + '" y="' + (lv.cy - 14) + '" text-anchor="middle" font-size="16">✅</text>' : '')
          + '</g>';
      });

      g.innerHTML = svg;

      // 路径：金色实线段 = 关 0 到最大已通关关 之间
      var maxCleared = -1;
      cleared.forEach(function (n) { if (n > maxCleared) maxCleared = n; });
      // 当前关位置也接着画实线
      var maxDrawn = Math.max(maxCleared, current != null ? current : -1);
      var mainPath = document.getElementById('silk-road-main');
      if (mainPath && maxDrawn >= 0 && LEVEL_META.length >= 2) {
        // 用多个连续 path，逐段画
        var fullD = mainPath.getAttribute('d');
        // 用 stroke-dasharray + stroke-dashoffset 实现"渐显"。但更简单的:
        // 既然只有一个 path，我们用 dasharray=pathLength 方法。
        // 但更稳：分段拼接 path。前 maxDrawn 段实线，后面虚线沿用 silk-road-bg。
        // 由于 SVG getPointAtLength 复杂，我们直接用 dasharray 法。
        var len = mainPath.getTotalLength ? mainPath.getTotalLength() : 0;
        if (len > 0) {
          // 比例：maxDrawn >= 5 = 全部, maxDrawn = 0 = 只有第一段到第一 marker
          // 总共 5 段连接 6 个 marker
          var totalSegs = LEVEL_META.length - 1;  // = 5
          var drawSegs = Math.max(0, Math.min(totalSegs, maxDrawn));  // 0..5
          var ratio = drawSegs / totalSegs;
          mainPath.style.opacity = '1';
          mainPath.setAttribute('stroke-dasharray', len);
          mainPath.setAttribute('stroke-dashoffset', String(len * (1 - ratio)));
        }
      }

      // 绑定 click（对 locked 友好：显示 toast）
      var allM = document.querySelectorAll('#silkroad-markers .slk-marker');
      allM.forEach(function (m) {
        var lv = parseInt(m.getAttribute('data-level'), 10);
        var clickable = m.getAttribute('data-clickable') === '1';
        if (clickable) {
          m.addEventListener('click', function () {
            window.location.href = '/games/silk-road/level/' + lv;
          });
          m.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              window.location.href = '/games/silk-road/level/' + lv;
            }
          });
        } else {
          m.addEventListener('click', function (e) {
            e.preventDefault();
            // 简单动效：抖一下
            m.style.transition = 'transform .1s ease';
            m.setAttribute('transform', 'translate(2 0)');
            setTimeout(function () { m.setAttribute('transform', 'translate(-2 0)'); }, 80);
            setTimeout(function () { m.setAttribute('transform', 'translate(0 0)'); }, 160);
          });
        }
      });

      // 已通关计数
      var cc = document.getElementById('wmp-cleared-count');
      if (cc) cc.innerHTML = '已通关 <b>' + cleared.length + '</b> / 6 关';
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderMarkers);
    } else {
      renderMarkers();
    }
    // 同一会话多 tab 同步
    window.addEventListener('storage', function (e) {
      if (e.key === 'silkroad_cleared_levels') renderMarkers();
    });
  </script>
</body>
</html>
