<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 个人空间</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">我的空间</a>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/games">游戏</a></li>
                <li><a href="/raise">养成</a></li>
                <li><a href="/economy">经济</a></li>
                <li><a href="/anniversary">纪念</a></li>
                {# <li><a href="/vpn/">代理</a></li> #}
                <li><a href="/#about">关于</a></li>
                <li><a href="/admin">管理</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                <span class="icon">🌙</span>
            </button>
        </div>
    </nav>

    <!-- Tetris Game Section -->
    <section class="tetris-section">
        <div class="container">
            <div class="game-container">
                <!-- Game Header -->
                <div class="game-header">
                    <h1 class="game-main-title">俄罗斯方块</h1>
                    <a href="/games" class="back-link">← 返回游戏中心</a>
                </div>

                <!-- Game Area -->
                <div class="tetris-wrapper">
                    <!-- Left Panel: Score Info -->
                    <div class="tetris-info">
                        <div class="info-block">
                            <h3>分数</h3>
                            <p id="score">0</p>
                        </div>
                        <div class="info-block">
                            <h3>等级</h3>
                            <p id="level">1</p>
                        </div>
                        <div class="info-block">
                            <h3>行数</h3>
                            <p id="lines">0</p>
                        </div>
                        <div class="info-block">
                            <h3>最高分</h3>
                            <p id="highScore">0</p>
                        </div>
                    </div>

                    <!-- Center: Game Canvas -->
                    <div class="tetris-board" id="tetrisBoard">
                        <canvas id="tetrisCanvas" width="300" height="600"></canvas>
                        <div id="gameOverlay" class="game-overlay">
                            <div class="overlay-content">
                                <h2 id="overlayTitle">俄罗斯方块</h2>
                                <p id="overlayMessage">按空格键或点击开始游戏</p>
                                <button id="startBtn" class="btn btn-primary">开始游戏</button>
                            </div>
                        </div>
                    </div>

                    <!-- Right Panel: Next Piece & Controls -->
                    <div class="tetris-side">
                        <div class="info-block">
                            <h3>下一个</h3>
                            <canvas id="nextCanvas" width="120" height="120"></canvas>
                        </div>
                        <div class="controls-info desktop-only">
                            <h3>键盘操作</h3>
                            <ul>
                                <li><kbd>←</kbd><kbd>→</kbd> 移动</li>
                                <li><kbd>↓</kbd> 加速下落</li>
                                <li><kbd>↑</kbd> 旋转</li>
                                <li><kbd>空格</kbd> 暂停/继续</li>
                            </ul>
                        </div>
                        <button id="pauseBtn" class="btn btn-secondary">暂停</button>
                        <button id="restartBtn" class="btn btn-secondary">重新开始</button>
                    </div>
                </div>

                <!-- Mobile Touch Controls -->
                <div class="mobile-controls">
                    <div class="mobile-controls-row">
                        <button class="ctrl-btn" id="btnRotate" aria-label="旋转">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 4v6h6M23 20v-6h-6"/>
                                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                            </svg>
                        </button>
                    </div>
                    <div class="mobile-controls-row">
                        <button class="ctrl-btn" id="btnLeft" aria-label="左移">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                        </button>
                        <button class="ctrl-btn" id="btnDown" aria-label="下落">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6 6 6-6"/>
                            </svg>
                        </button>
                        <button class="ctrl-btn" id="btnRight" aria-label="右移">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"/>
                            </svg>
                        </button>
                    </div>
                    <div class="mobile-controls-row">
                        <button class="ctrl-btn ctrl-btn-drop" id="btnDrop" aria-label="直接落底">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6 6 6-6M6 15l6 6 6-6"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="social-links">
                <a href="#" class="social-link" aria-label="GitHub">GitHub</a>
                <a href="#" class="social-link" aria-label="Twitter">Twitter</a>
                <a href="#" class="social-link" aria-label="Email">Email</a>
            </div>
            <p class="copyright">© 2024 我的个人空间. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tetris.js') }}"></script>
</body>
</html>
